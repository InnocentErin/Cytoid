name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  pr:
    name: Open release PR
    if: |
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'push'
        && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: danielroe/uppt/pr@3a4fd445ce266b91dd73ced7ae8140cc0f9fc19c # v0.5.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Tag and dispatch artifact build
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release/v')
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    steps:
      - uses: danielroe/uppt/release@3a4fd445ce266b91dd73ced7ae8140cc0f9fc19c # v0.5.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          publish-workflow: flutter-plugin-artifacts.yml

name: Flutter Plugin Artifacts

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: Build iOS UnityFramework.xcframework after Unity export
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  UNITY_VERSION: 6000.0.75f1
  FLUTTER_VERSION: 3.44.0

jobs:
  android:
    name: Android AAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false

      - name: Restore Unity Library cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-${{ env.UNITY_VERSION }}-
            Library-Android-

      - name: Install private vendor assets
        env:
          CYTOID_VENDOR_ARCHIVE: ${{ secrets.CYTOID_VENDOR_ARCHIVE_URL }}
          CYTOID_VENDOR_ARCHIVE_SHA256: ${{ secrets.CYTOID_VENDOR_ARCHIVE_SHA256 }}
        run: flutter_plugin/tool/install_vendor_from_archive.sh

      - name: Export and package Android Unity library
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: CytoidCoreBuild.ExportAndroidLibraryForFlutter
          allowDirtyBuild: true

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cytoid-game-core-android
          path: flutter_plugin/.cytoid_game_core/artifacts/unity/android/
          if-no-files-found: error

  ios-export:
    name: iOS Unity export
    runs-on: ubuntu-latest
    if: inputs.build_ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true

      - name: Restore Unity Library cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-iOS-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-iOS-${{ env.UNITY_VERSION }}-
            Library-iOS-

      - name: Install private vendor assets
        env:
          CYTOID_VENDOR_ARCHIVE: ${{ secrets.CYTOID_VENDOR_ARCHIVE_URL }}
          CYTOID_VENDOR_ARCHIVE_SHA256: ${{ secrets.CYTOID_VENDOR_ARCHIVE_SHA256 }}
        run: flutter_plugin/tool/install_vendor_from_archive.sh

      - name: Export iOS UnityLibrary Xcode project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: iOS
          buildMethod: CytoidCoreBuild.ExportIOSLibraryForFlutterWithoutPackaging
          allowDirtyBuild: true

      - name: Upload iOS Unity export
        uses: actions/upload-artifact@v4
        with:
          name: cytoid-game-core-ios-export
          path: flutter_plugin/.cytoid_game_core/exports/ios/UnityLibrary/
          if-no-files-found: error

  ios-package:
    name: iOS XCFramework
    runs-on: macos-15
    needs: ios-export
    if: inputs.build_ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS Unity export
        uses: actions/download-artifact@v4
        with:
          name: cytoid-game-core-ios-export
          path: flutter_plugin/.cytoid_game_core/exports/ios/UnityLibrary

      - name: Build UnityFramework.xcframework
        run: flutter_plugin/tool/build_unity_ios_framework.sh

      - name: Zip XCFramework
        run: ditto -c -k --sequesterRsrc --keepParent flutter_plugin/.cytoid_game_core/artifacts/unity/ios/UnityFramework.xcframework flutter_plugin/.cytoid_game_core/artifacts/unity/ios/UnityFramework.xcframework.zip

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cytoid-game-core-ios
          path: |
            flutter_plugin/.cytoid_game_core/artifacts/unity/ios/UnityFramework.framework/
            flutter_plugin/.cytoid_game_core/artifacts/unity/ios/UnityFramework.xcframework/
            flutter_plugin/.cytoid_game_core/artifacts/unity/ios/UnityFramework.xcframework.zip
          if-no-files-found: error

  flutter-package:
    name: Flutter plugin package
    runs-on: ubuntu-latest
    needs:
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: cytoid-game-core-android
          path: flutter_plugin/.cytoid_game_core/artifacts/unity/android

      - name: Flutter pub get
        working-directory: flutter_plugin
        run: flutter pub get

      - name: Analyze Flutter plugin
        working-directory: flutter_plugin
        run: flutter analyze lib test

      - name: Run Flutter plugin tests
        working-directory: flutter_plugin
        run: flutter test

      - name: Package Flutter plugin zip
        run: flutter_plugin/tool/package_flutter_plugin.sh

      - name: Upload Flutter plugin package
        uses: actions/upload-artifact@v4
        with:
          name: cytoid-game-core-flutter-plugin
          path: flutter_plugin/.cytoid_game_core/dist/cytoid_game_core-*.zip
          if-no-files-found: error
